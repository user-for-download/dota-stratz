global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'proxy-manager'
    static_configs:
      - targets: ['proxy-manager:9090']
        labels:
          service: 'proxy-manager'

  - job_name: 'parser'
    static_configs:
      - targets: ['parser:9093']
        labels:
          service: 'parser'

  - job_name: 'id-fetcher'
    static_configs:
      - targets: ['id-fetcher:9094']
        labels:
          service: 'id-fetcher'

  - job_name: 'detail-fetcher'
    static_configs:
      - targets: ['detail-fetcher:9091']
        labels:
          service: 'detail-fetcher'

  - job_name: 'rabbitmq'
    # Use /metrics/per-object (not /metrics) so per-queue labels are
    # preserved. The default /metrics endpoint in rabbitmq_prometheus
    # 3.13+ exposes aggregates only — queue-depth alerts need the
    # per-object endpoint to query queue="..." labels.
    metrics_path: /metrics/per-object
    static_configs:
      - targets: ['rabbitmq:15692']
        labels:
          service: 'rabbitmq'

  - job_name: 'ml'
    static_configs:
      - targets: ['api:8080']
        labels:
          service: 'ml'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9092']
