# ==============================================================================
# RabbitMQ configuration
# ==============================================================================
# Load users, vhosts, and permissions from definitions.json on startup.
# This automatically creates the per-service users (id-fetcher, detail-fetcher,
# parser) every time RabbitMQ starts, even after the data volume is wiped.
# ==============================================================================

management.load_definitions = /etc/rabbitmq/definitions.json
