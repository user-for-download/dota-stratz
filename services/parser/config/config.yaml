app:
  environment: "production"
  log_level: "info"

postgres:
  dsn: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable"

rabbitmq:
  url: "amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@${RABBITMQ_HOST}:5672/"
  queues:
    raw_matches: "${RABBITMQ_QUEUE_RAW_MATCHES:-queue.raw_matches}"
    raw_matches_dlq: "${RABBITMQ_QUEUE_RAW_MATCHES_DLQ:-queue.raw_matches.dlq}"

worker:
  # Worker tuning is env-overridable; defaults match the historical
  # baked-in values. Override via env (e.g. PARSER_WORKER_BATCH_SIZE=200)
  # and re-deploy.
  batch_size: ${PARSER_WORKER_BATCH_SIZE:-100}
  fetch_timeout_ms: ${PARSER_WORKER_FETCH_TIMEOUT_MS:-2000}
  prefetch: ${PARSER_WORKER_PREFETCH:-100}
  metrics_port: ${PARSER_METRICS_PORT:-9093}
